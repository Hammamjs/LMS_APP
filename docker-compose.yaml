services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      - redis-server
      - db
    restart: always
    environment:
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
      CI: 'true'
      NODE_OPTIONS: '--max-old-space-size=400'

  redis-server:
    image: redis:alpine
    container_name: redis-server
    ports:
      - '6379:6379'
    restart: always

  db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: lms
    ports:
      - '5432:5432'

volumes:
  node_modules:
